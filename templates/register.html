<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Credit Card Approval Predictor</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card card border-0 shadow-lg">
            <!-- Card Top Accent -->
            <div class="header-accent-primary py-1"></div>

            <div class="card-body p-5">
                <!-- Logo / Branding -->
                <div class="text-center mb-4">
                    <div class="auth-icon-wrapper mx-auto mb-3">
                        <i class="bi bi-person-plus fs-1 text-primary"></i>
                    </div>
                    <h4 class="fw-bold text-dark mb-1">Create Account</h4>
                    <p class="text-muted fs-7">Register to start screening credit card applications</p>
                </div>

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show py-2 fs-7" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- Registration Form -->
                <form action="{{ url_for('register') }}" method="POST" id="register-form">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-medium fs-7">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="name" name="name" placeholder="Enter your full name" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium fs-7">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium fs-7">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-medium fs-7">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm mb-3">
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>

                <hr class="my-3">

                <!-- Login Link -->
                <div class="text-center">
                    <p class="text-muted fs-7 mb-0">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
